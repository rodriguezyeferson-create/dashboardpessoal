<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Pessoal | SENAI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-chart-line"></i>
                    <span>AdminPro</span>
                </div>
                <button class="sidebar-toggle" id="sidebar-toggle">
                    <i class="fas fa-bars"></i>
                </button>
            </div>

            <nav class="sidebar-nav">
                <ul>
                    <li class="active">
                        <a href="#">
                            <i class="fas fa-tachometer-alt">
                                <span>Dashboard</span>
                            </i>
                        </a>
                    </li>
                    <li class="active">
                        <a href="#">
                            <i class="fas fa-users">
                                <span>Usuários</span>
                            </i>
                        </a>
                    </li>
                    <li class="active">
                        <a href="#">
                            <i class="fas fa-shopping-cart">
                                <span>Vendas</span>
                            </i>
                        </a>
                    </li>
                    <li class="active">
                        <a href="#">
                            <i class="fas fa-chart-bar">
                                <span>Relatórios</span>
                            </i>
                        </a>
                    </li>
                    <li class="active">
                        <a href="#">
                            <i class="fas fa-cog">
                                <span>Configurações</span>
                            </i>
                        </a>
                    </li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <a href="">
                    <i class="fa-sign-out-alt">
                    </i>
                    <span>sair</span>
                </a>
            </div>
        </aside>
        <!--conteudo principal-->
        <div class="main-content">
            <header class="topbar">
          <div class="search">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="pesquisar....">
          </div>
          <div class="user-area">
        <button class="dark-mode-togle" id="dark-mode-togle">
<i class="fas fa-moon"></i>
        </button>

        <div class="notification">
            <i class=" fas fa-bell"></i>
            <span class="bodge"></span>
        </div>
        <div class="user-profile">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQemVABO5QBaUw4JFtHcLeBpANZyd56GWB78Q&s" alt="">
        </div>
          </div>
            </header>
        </div>
    </div>    
</body>
</html>
